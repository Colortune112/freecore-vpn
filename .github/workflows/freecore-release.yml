name: FreeCore Release

# Триггеры:
# - push tag v1.2.3 → релиз с артефактами для всех платформ
# - workflow_dispatch → ручной запуск для тестов сборки без релиза
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag-name:
        description: 'Tag name (e.g. v1.0.0). Empty = test build, no release'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.8'

jobs:
  # ─── Сборка для каждой платформы ────────────────────────────────────────
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-14   # Apple Silicon runner
            artifact: FreeCoreVPN-macos.zip
          - platform: windows
            os: windows-latest
            artifact: FreeCoreVPN-windows.zip
          - platform: linux
            os: ubuntu-22.04
            artifact: FreeCoreVPN-linux.zip
          - platform: android
            os: ubuntu-22.04
            artifact: FreeCoreVPN-android.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ─── Java для Android ─────────────────────────────────────────────
      - name: Setup Java (Android only)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─── Flutter SDK ─────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ─── Linux нативные зависимости ──────────────────────────────────
      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build libgtk-3-dev libayatana-appindicator3-dev \
            libsecret-1-dev libjsoncpp-dev libsecret-1-0 libnotify-dev \
            libwebkit2gtk-4.1-dev fuse libfuse2 \
            libcurl4-openssl-dev libssl-dev libc-ares-dev zlib1g-dev
          # sentry-native через CMake находит libcurl с AsynchDNS при наличии
          # libcurl4-openssl-dev + libc-ares-dev. Без этого CMake падает на
          # `CURL: Required feature AsynchDNS is not found`.

      # ─── pub get + codegen ───────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner (Riverpod / freezed / drift codegen)
        run: dart run build_runner build --delete-conflicting-outputs

      # Prebuilt sing-box нативная библиотека (Go).
      # Hiddify Makefile тянет её из releases/hiddify-next-core/v<core.version>.
      # Без этого `flutter build {macos,windows,linux,apk}` падает на копировании
      # отсутствующего hiddify-core.{dylib,dll,so,aar}.
      # core.version читается из dependencies.properties.
      - name: Download hiddify-core prebuilt libs
        shell: bash
        run: |
          CORE_VERSION=$(grep '^core.version=' dependencies.properties | cut -d= -f2)
          BASE="https://github.com/hiddify/hiddify-next-core/releases/download/v${CORE_VERSION}"
          # Android получает Go-mobile AAR в android/app/libs/ (Gradle ищет там).
          # Desktop платформы получают .dylib/.so/.dll в hiddify-core/bin/
          # (CMake/Xcode/MSBuild смотрят туда). Hiddify Makefile lines 43+45.
          case "${{ matrix.platform }}" in
            macos)   ARCHIVE="hiddify-lib-macos.tar.gz";        DEST="hiddify-core/bin" ;;
            windows) ARCHIVE="hiddify-lib-windows-amd64.tar.gz"; DEST="hiddify-core/bin" ;;
            linux)   ARCHIVE="hiddify-lib-linux-amd64.tar.gz";  DEST="hiddify-core/bin" ;;
            android) ARCHIVE="hiddify-lib-android.tar.gz";      DEST="android/app/libs" ;;
          esac
          mkdir -p "$DEST"
          echo "Downloading: ${BASE}/${ARCHIVE} → ${DEST}/"
          curl -fL "${BASE}/${ARCHIVE}" | tar xz -C "$DEST/"
          ls -la "$DEST/"

      # ─── Сборка ──────────────────────────────────────────────────────
      - name: Build macOS
        if: matrix.platform == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          zip -r9 "${{ matrix.artifact }}" "FreeCore VPN.app"
          mv "${{ matrix.artifact }}" "$GITHUB_WORKSPACE/${{ matrix.artifact }}"

      - name: Build Windows
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          flutter build windows --release
          cd build/windows/x64/runner/Release
          7z a -r "$GITHUB_WORKSPACE/${{ matrix.artifact }}" .

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          flutter build linux --release
          cd build/linux/x64/release/bundle
          zip -r9 "$GITHUB_WORKSPACE/${{ matrix.artifact }}" .

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: |
          flutter build apk --release --split-per-abi
          # Универсальный APK тоже соберём — для прямой раздачи
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk \
             "$GITHUB_WORKSPACE/${{ matrix.artifact }}"

      # ─── Загрузка артефакта ──────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 30

  # ─── Создание GitHub Release ────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag-name != ''
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag-name || github.ref_name }}
          name: FreeCore VPN ${{ github.event.inputs.tag-name || github.ref_name }}
          draft: true   # снимет с draft руками после проверки
          generate_release_notes: true
          files: |
            artifacts/macos/*
            artifacts/windows/*
            artifacts/linux/*
            artifacts/android/*
